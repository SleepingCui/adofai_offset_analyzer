<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADOFAI Offset Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-matrix@2.0.1/dist/chartjs-chart-matrix.min.js"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --panel-color: #1e1e1e;
            --card-color: #252525;
            --text-color: #ffffff;
            --accent-color: #4caf50;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 95%;
            max-width: 1400px;
            background: var(--panel-color);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .page-title {
            margin: 0 0 20px 0;
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-color);
            text-align: center;
        }
        #metaInfo {
            font-size: 0.9rem; 
            color: #aaa; 
            text-align: right;
            max-width: 60%; 
            word-break: break-all; 
            line-height: 1.4;
        }
        .header-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start; 
            margin-bottom: 20px;
            gap: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .button-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .btn {
            background-color: var(--accent-color);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
            font-size: 14px;
            line-height: 1.4;
            white-space: nowrap;
        }
        .btn:hover { background-color: #45a049; }
        .btn-reset { background-color: #2196F3; }
        .btn-reset:hover { background-color: #0b7dda; }
        .btn-clear { background-color: #f44336; }
        .btn-clear:hover { background-color: #d32f2f; }
        input[type="file"] {
            position: absolute;
            font-size: 100px;
            opacity: 0;
            right: 0;
            top: 0;
            cursor: pointer;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stats-card {
            background: var(--card-color);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #555;
        }
        .stats-card h3 { margin: 0 0 5px 0; font-size: 0.85rem; color: #aaa; text-transform: uppercase; }
        .stats-card .value { font-size: 1.6rem; font-weight: bold; margin-bottom: 5px; }
        .stats-card .sub-value { font-size: 0.75rem; color: #888; }

        .margin-counts-box {
            display: flex;
            flex-wrap: wrap;
            align-items: center; 
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: var(--card-color);
            border-radius: 8px;
        }

        .numbers-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .pure-number {
            font-size: 1.5rem;
            font-weight: 400;
            line-height: 1.2;
        }

        .xacc-display {
            font-size: 1.8rem;
            font-weight: 400;
            color: #60FF4E;
            white-space: nowrap;
        }

        .charts-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .chart-section {
            position: relative;
            width: 100%;
        }
        
        .chart-section h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: #aaa;
            text-align: center;
        }
        
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 500px;
            background-color: #0a0a0a;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .distribution-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
            padding: 8px;
            background: var(--card-color);
            border-radius: 8px;
        }
        .dist-stat-item {
            flex: 1;
            min-width: 100px;
            text-align: center;
        }
        .dist-stat-item .label {
            font-size: 0.7rem;
            color: #aaa;
            margin-bottom: 2px;
        }
        .dist-stat-item .value {
            font-size: 1rem;
            font-weight: bold;
        }
        
        .tip {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #777;
            text-align: center;
            padding: 5px 0;
        }
        
        @media (max-width: 1200px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .header-panel {
                flex-direction: column;
                align-items: stretch;
            }
            .button-group {
                flex-direction: column;
                width: 100%;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="page-title">ADOFAI Offset Analyzer</h1>
    <div class="header-panel">
        <div class="button-group">
            <div class="file-input-wrapper">
                <button class="btn">导入 JSON</button>
                <input type="file" id="jsonFile" accept=".json">
            </div>
            <button class="btn btn-reset" id="resetZoom">重置缩放</button>
            <button class="btn btn-clear" id="clearData">清空</button>
        </div>
        <div id="metaInfo" style="font-size: 0.9rem; color: #aaa; text-align: right;">
            等待导入...
        </div>
    </div>

    <div class="stats-grid">
        <div class="stats-card" style="border-left-color: #2196F3;">
            <h3>总按键数</h3>
            <div class="value" id="statTotal">-</div>
        </div>
        <div class="stats-card" style="border-left-color: #ffb74d;">
            <h3>最大连击数</h3>
            <div class="value" id="statMaxCombo">-</div>
        </div>
        <div class="stats-card" style="border-left-color: #d958ff;">
            <h3>UR (不稳定度)</h3>
            <div class="value" id="statUR">-</div>
        </div>
    </div>



    <div class="margin-counts-box" id="marginCountsBox">
        <div class="numbers-group" id="pureNumbersContainer">
        </div>
        <div class="xacc-display" id="xaccValue">XACC: -</div>
    </div>

    <div class="charts-container">
        <div class="chart-section">
            <h3>偏移量散点图</h3>
            <div class="chart-wrapper">
                <canvas id="scatterChart"></canvas>
            </div>
        </div>
        
        <div class="chart-section">
            <h3>正态分布图</h3>
            <div class="distribution-stats" id="distributionStats"></div>
            <div class="chart-wrapper">
                <canvas id="distributionChart"></canvas>
            </div>
        </div>
        
        <div class="chart-section">
            <h3>判定分布比例</h3>
            <div class="chart-wrapper">
            <canvas id="distributionPieChart"></canvas>
        </div>

        
        <div class="chart-section">
            <h3>XACC变化曲线</h3>
            <div class="chart-wrapper">
            <canvas id="xaccChart"></canvas> 
        </div>

    </div>

    <div class="tip">
    提示:直接点击图例可切换显示判定类型<br>
    <a href="https://github.com/SleepingCui/TimingShow" target="_blank">TimingShow</a> | <a href="https://github.com/SleepingCui/adofai_offset_analyzer" target="_blank">Website source</a>
</div>
</div>

<script src="app.js"></script>

</body>
</html>
